services:
  db:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodle
      MYSQL_PASSWORD: moodlepwd
    volumes:
      - db_data:/var/lib/mysql

  moodle:
    image: moodlehq/moodle-php-apache:8.3
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./moodle_source:/var/www/html
      - moodle_data:/var/www/moodledata
    depends_on:
      - db

volumes:
  db_data:
  moodle_data: